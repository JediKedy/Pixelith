name: Generate Wallpaper JSON
on: [push] # Runs every time you upload a file

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Generate JSON
        run: |
          echo "[" > wallpapers.json
          # 1. This finds images in ANY subfolder, ignoring case (-iname)
          # 2. It excludes the .github folder and the root directory
          find . -mindepth 2 -type f \( -iname "*.jpg" -o -iname "*.png" -o -iname "*.webp" -o -iname "*.jpeg" \) | grep -v ".github" | while read file; do
            
            # This gets the folder name (e.g., 'Nature')
            category=$(echo "$file" | cut -d'/' -f2)
            
            # This gets the filename (e.g., 'forest.jpg')
            name=$(basename "$file")
            
            # This creates the URL and handles spaces in filenames
            url="https://raw.githubusercontent.com/${{ github.repository }}/main/${file#./}"
            url=$(echo "$url" | sed 's/ /%20/g')
            
            echo "  {\"name\": \"$name\", \"category\": \"$category\", \"url\": \"$url\"}," >> wallpapers.json
          done
          
          # Fix the JSON formatting (remove last comma)
          sed -i '$ s/,$//' wallpapers.json
          echo "]" >> wallpapers.json
      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add wallpapers.json
          git commit -m "Update wallpapers.json" || exit 0
          git push
