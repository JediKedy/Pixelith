name: Generate Wallpaper JSON
on: [push] # Runs every time you upload a file

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Generate JSON
        run: |
          echo "[" > wallpapers.json
          # Find all images inside the repo, excluding the hidden .github folder
          find . -mindepth 2 -not -path '*/.*' -type f \( -iname "*.jpg" -o -iname "*.png" -o -iname "*.jpeg" \) | while read file; do
            # Get the folder name as the category (the folder containing the file)
            category=$(basename $(dirname "$file"))
            name=$(basename "$file")
            url="https://raw.githubusercontent.com/${{ github.repository }}/main/${file#./}"
            # Fix spaces for URLs
            url=$(echo "$url" | sed 's/ /%20/g')
            echo "  {\"name\": \"$name\", \"category\": \"$category\", \"url\": \"$url\"}," >> wallpapers.json
          done
          # Remove trailing comma and close JSON
          sed -i '$ s/,$//' wallpapers.json
          echo "]" >> wallpapers.json
      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add wallpapers.json
          git commit -m "Update wallpapers.json" || exit 0
          git push
